project_name: wgcf

before:
  hooks:
    - go mod tidy

builds:
  - id: wgcf
    main: .
    binary: wgcf
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{ .Version }}_
      {{ .Os }}_
      {{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: ViRb3
    name: wgcf
  draft: false
  prerelease: auto

changelog:
  use: git
  sort: asc
